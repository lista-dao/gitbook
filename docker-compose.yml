version: "3.8"

services:
  bot:
    build: .
    container_name: gitbook-rag-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
